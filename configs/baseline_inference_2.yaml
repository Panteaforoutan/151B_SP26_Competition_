experiment_name: baseline_inference_2

model_id: Qwen/Qwen3-4B-Thinking-2507

eval_path: data/public.jsonl

use_lora: false
max_lora_rank: 16
adapter_dir: outputs/.../...

output_path: outputs/baseline_inference_2.jsonl

metrics_path: outputs/baseline_inference/baseline_inference__2_metrics.jsonl
results_path: outputs/baseline_inference/baseline_inference_2_results.jsonl

is_submission: false
final_csv: outputs/.../...

batch_size: 10

eval_subset_size: 
eval_subset_seed: 42
save_eval: true


dtype: bfloat16
max_model_len: 4096
gpu_memory_utilization: 0.80
enforce_eager: true
max_num_seqs: 1
max_num_batched_tokens: 2048

temperature: 0
top_p: 1
top_k: -1
max_tokens : 12288
mcq_max_tokens : 12288
free_form_max_tokens : 12288 

prompts:
  math: |
    You are an expert mathematician. Think carefully before answering each question.
    Put your final answer inside \boxed{}.

    Example:
    Question: What is 20% of 100?
    Solution: 20% of 100 = 0.20 × 100 = 20.
    Final Answer: \boxed{20}

    Now solve the following problem.
    If the problem has multiple sub-answers, separate them by commas inside a single \boxed{}, e.g. \boxed{3, 7}.

  mcq: |
    You are an expert mathematician.
    Read the problem carefully and read all answer choices.
    Break the problem into clear steps and double-check your work.
    Reason through the answer choices and eliminate wrong choices.
    Then choose the single best answer.
    After your reasoning, state your final answer as a single letter inside \boxed{}, e.g. \boxed{C}

    Example:
    Question: What is 10 + 17?
    A. 37
    B. 10
    C. 17
    D. 27

    Solution: 10 + 17 = 27, so the answer is option D.
    Final Answer: \boxed{D}
    